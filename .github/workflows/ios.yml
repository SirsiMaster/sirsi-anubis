name: iOS — Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'mobile/**'
      - 'internal/platform/ios.go'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      deploy_testflight:
        description: 'Deploy to TestFlight'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build xcframework
        run: make ios-framework

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (no signing)
        working-directory: ios
        run: |
          xcodebuild \
            -target Pantheon \
            -target PantheonWidgets \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            DERIVED_DATA_PATH=build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/Debug-iphoneos/
          retention-days: 7

  testflight:
    name: Deploy to TestFlight
    needs: build
    runs-on: macos-15
    if: github.event.inputs.deploy_testflight == 'true'
    environment: ios-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Install tools
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Build xcframework
        run: make ios-framework

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Deploy to TestFlight
        working-directory: ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_API_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: fastlane beta
