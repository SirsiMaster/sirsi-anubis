<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Ankh Alert: Gold highlight — active warning state -->
  <!-- Loop (head) -->
  <ellipse cx="12" cy="7" rx="4" ry="5" />
  <!-- Cross arms -->
  <line x1="6" y1="14" x2="18" y2="14" />
  <!-- Vertical shaft -->
  <line x1="12" y1="12" x2="12" y2="23" />
  <!-- Alert dot -->
  <circle cx="19" cy="4" r="3" fill="#C8A951" stroke="none" />
</svg>
