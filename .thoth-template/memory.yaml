# 𓁟 Thoth — Project Memory Template
# Copy this directory into any new Sirsi ecosystem project.
# Structure: .thoth/memory.yaml, .thoth/journal.md, .thoth/artifacts/
#
# Usage:
#   cp -r .thoth-template/ .thoth/
#   Edit .thoth/memory.yaml with your project details
#   Commit .thoth/ to git
#
# AI agents should read .thoth/memory.yaml FIRST before any source files.
# This template is MIT licensed and part of the Sirsi Thoth specification.

