# .golangci.yml — Sirsi Pantheon linter configuration (golangci-lint v2)
# Rule A6: golangci-lint must pass with zero errors on every push/PR.
version: "2"

run:
  timeout: 5m
  go: "1.24"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - copyloopvar

  exclusions:
    rules:
      - path: ".*_test\\.go"
        linters:
          - errcheck
          - bodyclose

      - linters:
          - unused
        text: "parameter .* always receives"

    presets:
      - std-error-handling

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Exec
        - (*database/sql.Tx).Rollback
        - os.Remove
        - os.RemoveAll
        - os.MkdirAll
        - os.WriteFile
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
        - io.Copy
        - io.WriteString
        - (*bytes.Buffer).WriteString
        - (*bytes.Buffer).Write
        - (*strings.Builder).WriteString
        - (*strings.Builder).Write
        - go/printer.Fprint
        - (*github.com/SirsiMaster/sirsi-pantheon/internal/vault.Store).Close
        - (*github.com/SirsiMaster/sirsi-pantheon/internal/vault.CodeIndex).Close
        - (*github.com/SirsiMaster/sirsi-pantheon/internal/notify.Store).Close

    govet:
      enable-all: true
      disable:
        - fieldalignment

    misspell:
      locale: US

    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1003"
        - "-ST1000"
        - "-ST1005"
        - "-ST1020"
        - "-ST1022"
        - "-ST1023"
        - "-ST1021"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
