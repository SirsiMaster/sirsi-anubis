  <text x="60" y="333" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="11" font-weight="700">3</text>
  <text x="82" y="333" fill="#C8A951" font-family="Cinzel, serif" font-size="10" letter-spacing="0.06em">PERSISTENT MEMORY (~/.thoth/)</text>

  <!-- Layer 1: memory.yaml (STAR) -->
  <rect x="130" y="320" width="940" height="68" rx="12" fill="rgba(200,169,81,0.06)" stroke="#C8A951" stroke-width="1.5"/>
  <rect x="145" y="328" width="60" height="22" rx="4" fill="rgba(200,169,81,0.15)"/>
  <text x="175" y="344" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="10" font-weight="700">L1</text>
  <text x="230" y="342" fill="#C8A951" font-family="Cinzel, serif" font-size="12" font-weight="700">MEMORY.YAML</text>
  <text x="400" y="342" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="10">Structured YAML  ~50 lines</text>
  <text x="230" y="362" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">Identity / Architecture / Conventions / State</text>
  <text x="600" y="362" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">Full project context in &lt; 2K tokens</text>
  <text x="900" y="342" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="10" font-weight="600">THE STAR</text>

  <!-- Layer 2: journal.md -->
  <rect x="130" y="396" width="940" height="58" rx="12" fill="rgba(16,185,129,0.04)" stroke="#10B981" stroke-width="1"/>
  <rect x="145" y="404" width="60" height="22" rx="4" fill="rgba(16,185,129,0.12)"/>
  <text x="175" y="420" text-anchor="middle" fill="#10B981" font-family="Cinzel, serif" font-size="10" font-weight="700">L2</text>
  <text x="230" y="418" fill="#10B981" font-family="Cinzel, serif" font-size="12" font-weight="700">JOURNAL.MD</text>
