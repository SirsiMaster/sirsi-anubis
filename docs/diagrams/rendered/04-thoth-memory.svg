  <circle cx="60" cy="562" r="12" fill="none" stroke="#C8A951" stroke-width="1.2"/>
  <text x="60" y="567" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="11" font-weight="700">4</text>
  <text x="82" y="567" fill="#C8A951" font-family="Cinzel, serif" font-size="10" letter-spacing="0.06em">MCP SERVER (JSON-RPC 2.0)</text>

  <rect x="130" y="550" width="940" height="60" rx="12" fill="rgba(200,169,81,0.04)" stroke="rgba(200,169,81,0.2)" stroke-width="1"/>

  <rect x="145" y="560" width="170" height="38" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="230" y="580" text-anchor="middle" fill="#F0EDE5" font-family="JetBrains Mono, monospace" font-size="9">thoth_read_memory</text>
  <text x="230" y="592" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="7">Returns memory.yaml</text>

  <rect x="325" y="560" width="170" height="38" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="410" y="580" text-anchor="middle" fill="#F0EDE5" font-family="JetBrains Mono, monospace" font-size="9">thoth_read_journal</text>
  <text x="410" y="592" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="7">Latest journal entry</text>

  <rect x="505" y="560" width="170" height="38" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="590" y="580" text-anchor="middle" fill="#F0EDE5" font-family="JetBrains Mono, monospace" font-size="9">thoth_read_artifact</text>
  <text x="590" y="592" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="7">Specific deep-dive doc</text>

  <rect x="685" y="560" width="170" height="38" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="770" y="580" text-anchor="middle" fill="#F0EDE5" font-family="JetBrains Mono, monospace" font-size="9">thoth_sync</text>
  <text x="770" y="592" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="7">Full re-sync trigger</text>

  <rect x="865" y="560" width="170" height="38" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="950" y="580" text-anchor="middle" fill="#F0EDE5" font-family="JetBrains Mono, monospace" font-size="9">thoth_status</text>
  <text x="950" y="592" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="7">Freshness + token stats</text>

  <!-- Arrow down -->
  <line x1="600" y1="610" x2="600" y2="632" stroke="#C8A951" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- ===== SECTION 5: CONSUMERS ===== -->
  <circle cx="60" cy="648" r="12" fill="none" stroke="#C8A951" stroke-width="1.2"/>
  <text x="60" y="653" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="11" font-weight="700">5</text>
  <text x="82" y="653" fill="#C8A951" font-family="Cinzel, serif" font-size="10" letter-spacing="0.06em">AI SESSION CONSUMERS</text>

  <rect x="200" y="636" width="170" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="285" y="660" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="10" font-weight="500">Claude Code</text>

  <rect x="400" y="636" width="170" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="485" y="660" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="10" font-weight="500">Cursor</text>

  <rect x="600" y="636" width="170" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="685" y="660" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="10" font-weight="500">Windsurf</text>

  <rect x="800" y="636" width="170" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="885" y="660" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="10" font-weight="500">Any MCP Client</text>

  <!-- ===== LEGEND / BEFORE-AFTER ===== -->
  <rect x="0" y="700" width="1200" height="100" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Before -->
  <rect x="40" y="715" width="340" height="60" rx="10" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="210" y="733" text-anchor="middle" fill="#EF4444" font-family="Cinzel, serif" font-size="10" font-weight="600">BEFORE THOTH</text>
  <text x="210" y="750" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">5-10 min re-reading / 100K tokens burned / $0.30/session</text>
  <text x="210" y="765" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">Every session starts from scratch</text>

  <!-- After -->
  <rect x="430" y="715" width="340" height="60" rx="10" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
  <text x="600" y="733" text-anchor="middle" fill="#10B981" font-family="Cinzel, serif" font-size="10" font-weight="600">AFTER THOTH</text>
  <text x="600" y="750" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">200ms memory load / 2K tokens / $0.006/session</text>
  <text x="600" y="765" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">Instant project context every time</text>

  <!-- Legend items -->
  <text x="820" y="730" fill="#C8A951" font-family="Cinzel, serif" font-size="9" letter-spacing="0.06em">LEGEND</text>
  <rect x="820" y="740" width="14" height="14" rx="2" fill="none" stroke="#C8A951" stroke-width="1.2"/>
  <text x="842" y="751" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">L1 memory.yaml (gold = star)</text>
  <rect x="1000" y="740" width="14" height="14" rx="2" fill="none" stroke="#10B981" stroke-width="1"/>
  <text x="1022" y="751" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">L2 journal.md</text>
  <rect x="820" y="762" width="14" height="14" rx="2" fill="none" stroke="rgba(240,237,229,0.12)" stroke-width="1"/>
  <text x="842" y="773" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">L3 artifacts/ (on demand)</text>

  <text x="1170" y="790" text-anchor="end" fill="rgba(240,237,229,0.25)" font-family="Inter, sans-serif" font-size="7">Sirsi Technologies 2026</text>
