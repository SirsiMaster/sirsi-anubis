  <text x="230" y="438" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">Decisions / Progress / Blockers</text>
  <text x="600" y="438" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">AI reads latest entry only</text>

  <!-- Layer 3: artifacts/ -->
  <rect x="130" y="462" width="940" height="58" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(240,237,229,0.12)" stroke-width="1"/>
  <rect x="145" y="470" width="60" height="22" rx="4" fill="rgba(240,237,229,0.06)"/>
  <text x="175" y="486" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Cinzel, serif" font-size="10" font-weight="700">L3</text>
  <text x="230" y="484" fill="rgba(240,237,229,0.5)" font-family="Cinzel, serif" font-size="12" font-weight="700">ARTIFACTS/</text>
  <text x="400" y="484" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Deep-dive documents</text>
  <text x="230" y="504" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="9">Architecture diagrams / Benchmarks / Case studies</text>
  <text x="700" y="504" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="9">Referenced on demand, not every session</text>

  <!-- Arrow down -->
  <line x1="600" y1="520" x2="600" y2="546" stroke="#C8A951" stroke-width="1.5" marker-end="url(#arr4)"/>
