<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A951"/>
    </marker>
    <marker id="arr4e" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arr4down" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0, 3.5 10, 7 0" fill="#C8A951"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#020C08"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="52" fill="rgba(200,169,81,0.08)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <text x="600" y="33" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="18" font-weight="700" letter-spacing="0.08em">THOTH MEMORY SYSTEM ARCHITECTURE</text>
  <text x="600" y="68" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="11" font-weight="300">Write it down once so no one has to re-read it</text>

  <!-- ===== SECTION 1: INPUT SOURCES ===== -->
  <circle cx="60" cy="102" r="12" fill="none" stroke="#C8A951" stroke-width="1.2"/>
  <text x="60" y="107" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="11" font-weight="700">1</text>
  <text x="82" y="107" fill="#C8A951" font-family="Cinzel, serif" font-size="10" letter-spacing="0.06em">INPUT SOURCES</text>

  <rect x="40" y="118" width="260" height="50" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="170" y="140" text-anchor="middle" fill="#F0EDE5" font-family="Inter, sans-serif" font-size="10" font-weight="500">Git History</text>
  <text x="170" y="156" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">commits / diffs / blame</text>

  <rect x="320" y="118" width="260" height="50" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="450" y="140" text-anchor="middle" fill="#F0EDE5" font-family="Inter, sans-serif" font-size="10" font-weight="500">Source Code</text>
  <text x="450" y="156" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">Go packages / tests / configs</text>

  <rect x="600" y="118" width="260" height="50" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="730" y="140" text-anchor="middle" fill="#F0EDE5" font-family="Inter, sans-serif" font-size="10" font-weight="500">Architectural Decisions</text>
  <text x="730" y="156" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">ADRs / CLAUDE.md / rules</text>

  <rect x="880" y="118" width="280" height="50" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="1020" y="140" text-anchor="middle" fill="#F0EDE5" font-family="Inter, sans-serif" font-size="10" font-weight="500">Session Activity</text>
  <text x="1020" y="156" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">commands run / files changed</text>

  <!-- Arrow down -->
  <line x1="600" y1="168" x2="600" y2="196" stroke="#C8A951" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="635" y="186" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">raw project state</text>

  <!-- ===== SECTION 2: SYNC ENGINE ===== -->
  <circle cx="60" cy="212" r="12" fill="none" stroke="#C8A951" stroke-width="1.2"/>
  <text x="60" y="217" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="11" font-weight="700">2</text>
  <text x="82" y="217" fill="#C8A951" font-family="Cinzel, serif" font-size="10" letter-spacing="0.06em">THOTH SYNC ENGINE</text>

  <rect x="200" y="204" width="800" height="80" rx="12" fill="rgba(200,169,81,0.04)" stroke="rgba(200,169,81,0.2)" stroke-width="1"/>

  <!-- Phase 1 -->
  <rect x="215" y="215" width="240" height="56" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="335" y="234" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="9" font-weight="600">Phase 1: Identity Fields</text>
  <text x="335" y="250" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">Project name / version / language</text>
  <text x="335" y="262" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">module count / test count / LOC</text>

  <!-- Arrow -->
  <line x1="455" y1="243" x2="475" y2="243" stroke="rgba(240,237,229,0.3)" stroke-width="1" marker-end="url(#arr4)"/>

  <!-- Phase 2 -->
  <rect x="480" y="215" width="240" height="56" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="600" y="234" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="9" font-weight="600">Phase 2: Journal from Git</text>
  <text x="600" y="250" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">Recent commits to session entries</text>
  <text x="600" y="262" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">Decision rationale extraction</text>

  <!-- Arrow -->
  <line x1="720" y1="243" x2="740" y2="243" stroke="rgba(240,237,229,0.3)" stroke-width="1" marker-end="url(#arr4)"/>

  <!-- Phase 3 -->
  <rect x="745" y="215" width="240" height="56" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
  <text x="865" y="234" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="9" font-weight="600">Phase 3: Compression</text>
  <text x="865" y="250" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">22,958 lines --> 297 lines</text>
  <text x="865" y="262" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="8" font-weight="600">~98% token reduction</text>

  <!-- Arrow down -->
  <line x1="600" y1="284" x2="600" y2="312" stroke="#C8A951" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="640" y="302" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">compressed output</text>

