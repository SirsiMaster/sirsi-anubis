  <text x="650" y="600" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">1. Net publishes the Plan</text>
  <text x="650" y="614" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">2. Machine Gods execute the Plan</text>
  <text x="650" y="628" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">3. Ma'at weighs the Execution</text>
  <text x="890" y="600" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">4. Isis heals the Drift</text>
  <text x="890" y="614" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">5. Thoth records the Achievement</text>
  <text x="890" y="628" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">6. Net re-aligns the Weave</text>

