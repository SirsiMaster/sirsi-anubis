  <text x="880" y="450" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="12" font-weight="700">OSIRIS -- CHECKPOINT</text>
  <text x="880" y="468" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">State preservation</text>
