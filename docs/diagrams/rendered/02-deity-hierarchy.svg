  <text x="180" y="448" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">Doctor diagnostics</text>
  <text x="180" y="462" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">Network security / Auto-fix</text>
