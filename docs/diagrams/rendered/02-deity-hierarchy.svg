  <text x="180" y="356" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">Context compression</text>
  <text x="180" y="370" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">Session persistence</text>
