  <line x1="500" y1="240" x2="320" y2="280" stroke="#C8A951" stroke-width="1.2" marker-end="url(#arr2)"/>
  <text x="380" y="260" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">publishes plan</text>
