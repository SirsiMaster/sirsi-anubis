  <text x="440" y="356" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">QA governance</text>
  <text x="440" y="370" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="9">Pre-push gates (ALL repos)</text>
  <text x="440" y="386" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="JetBrains Mono, monospace" font-size="8">Feather Weight 0-100</text>

