  <rect x="400" y="180" width="400" height="60" rx="12" fill="rgba(200,169,81,0.06)" stroke="#C8A951" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="600" y="205" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="14" font-weight="700">NET -- THE SCOPE WEAVER</text>
  <text x="600" y="222" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Development plan / ADRs / Canon alignment</text>
  <text x="600" y="234" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8" font-style="italic">Even Ra submits to Net's weave</text>

