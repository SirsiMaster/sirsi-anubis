<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A951"/>
    </marker>
    <marker id="arr2e" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <linearGradient id="raGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A951;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C8A951;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="#020C08"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="52" fill="rgba(200,169,81,0.08)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <text x="600" y="33" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="18" font-weight="700" letter-spacing="0.08em">DEITY HIERARCHY &amp; GOVERNANCE</text>
  <text x="600" y="68" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="11" font-weight="300">Every deity has one glyph, one domain, one responsibility</text>

  <!-- ===== RA ===== -->
  <rect x="420" y="82" width="360" height="72" rx="16" fill="url(#raGlow)" stroke="#C8A951" stroke-width="2"/>
  <text x="600" y="108" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="16" font-weight="700" filter="url(#glow2)">RA -- SUPREME OVERSEER</text>
  <text x="600" y="126" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Fleet orchestration / Agent deployment / ProtectGlyph authority</text>
  <text x="600" y="142" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="9" font-style="italic">Enterprise Tier</text>

  <!-- Arrow Ra to Net -->
  <line x1="600" y1="154" x2="600" y2="172" stroke="#C8A951" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="630" y="166" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">deploys via scopes</text>

