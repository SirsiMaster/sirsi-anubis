  <rect x="20" y="270" width="340" height="90" rx="14" fill="rgba(200,169,81,0.06)" stroke="#C8A951" stroke-width="1.5"/>
  <circle cx="42" cy="292" r="12" fill="rgba(200,169,81,0.15)" stroke="#C8A951" stroke-width="1"/>
  <text x="42" y="297" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="12" font-weight="700">6</text>
  <text x="210" y="296" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="13" font-weight="700">NET RE-ALIGNS THE WEAVE</text>
  <text x="190" y="318" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Compare current state to plan</text>
  <text x="190" y="336" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Detect scope drift / Issue corrective weave</text>
  <text x="190" y="352" text-anchor="middle" fill="rgba(240,237,229,0.3)" font-family="JetBrains Mono, monospace" font-size="8">net.realign.issued</text>
  <!-- Dashed to Stele -->
  <line x1="360" y1="340" x2="490" y2="365" stroke="rgba(240,237,229,0.12)" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ===== CYCLE ARROWS (solid, main flow) ===== -->
  <!-- 1 -> 2 -->
  <path d="M 800 130 Q 860 140, 880 170" fill="none" stroke="#C8A951" stroke-width="2" marker-end="url(#arr7)"/>
  <text x="845" y="148" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">plan &amp; scope</text>

  <!-- 2 -> 3 -->
  <path d="M 1010 260 Q 1020 320, 1010 380" fill="none" stroke="#C8A951" stroke-width="2" marker-end="url(#arr7)"/>
  <text x="1030" y="320" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">findings</text>

  <!-- 3 -> 4 (fail path) -->
  <path d="M 980 480 Q 950 510, 930 530" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr7)"/>
  <text x="975" y="510" fill="#EF4444" font-family="Inter, sans-serif" font-size="8" font-weight="600">fail</text>

  <!-- 3 -> 5 (pass path) -->
  <path d="M 840 450 Q 650 510, 560 540" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr7e)"/>
  <text x="720" y="490" fill="#10B981" font-family="Inter, sans-serif" font-size="8" font-weight="600">pass (>= 85)</text>

  <!-- 4 -> 5 -->
  <path d="M 640 575 Q 600 575, 560 575" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arr7e)"/>
  <text x="600" y="568" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">healed state</text>

  <!-- 5 -> 6 -->
  <path d="M 260 530 Q 220 460, 200 360" fill="none" stroke="#C8A951" stroke-width="2" marker-end="url(#arr7)"/>
  <text x="215" y="450" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">updated knowledge</text>

  <!-- 6 -> 1 -->
  <path d="M 260 270 Q 340 200, 400 150" fill="none" stroke="#C8A951" stroke-width="2" marker-end="url(#arr7)"/>
  <text x="310" y="200" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="8">next iteration</text>

  <!-- ===== LEGEND ===== -->
  <rect x="0" y="700" width="1200" height="100" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="600" y="722" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="10" letter-spacing="0.08em">LEGEND</text>

  <line x1="60" y1="746" x2="100" y2="746" stroke="#C8A951" stroke-width="2"/>
  <text x="110" y="750" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Main cycle flow</text>

  <line x1="260" y1="746" x2="300" y2="746" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="310" y="750" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Pass path (score >= 85)</text>

  <line x1="490" y1="746" x2="530" y2="746" stroke="#EF4444" stroke-width="1.5"/>
  <text x="540" y="750" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Fail path (to Isis)</text>

  <line x1="690" y1="746" x2="730" y2="746" stroke="rgba(240,237,229,0.12)" stroke-width="0.8" stroke-dasharray="3,4"/>
  <text x="740" y="750" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Event inscription (to Stele)</text>

  <rect x="60" y="765" width="16" height="14" rx="3" fill="none" stroke="#C8A951" stroke-width="1"/>
  <text x="84" y="776" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Net / Ma'at (governance)</text>

  <rect x="260" y="765" width="16" height="14" rx="3" fill="none" stroke="#10B981" stroke-width="1"/>
  <text x="284" y="776" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Execute / Isis / Thoth (operations)</text>

  <rect x="530" y="765" width="16" height="14" rx="3" fill="none" stroke="rgba(240,237,229,0.15)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="554" y="776" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="9">Stele (event bus, center)</text>

  <text x="1170" y="790" text-anchor="end" fill="rgba(240,237,229,0.25)" font-family="Inter, sans-serif" font-size="7">Sirsi Technologies 2026</text>
</svg>