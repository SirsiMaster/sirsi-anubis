  <line x1="680" y1="530" x2="620" y2="420" stroke="rgba(240,237,229,0.12)" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ===== STEP 5: THOTH RECORDS ===== (bottom center-left) -->
  <rect x="220" y="530" width="340" height="90" rx="14" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="242" cy="552" r="12" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1"/>
  <text x="242" y="557" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="12" font-weight="700">5</text>
  <text x="410" y="556" text-anchor="middle" fill="#10B981" font-family="Cinzel, serif" font-size="13" font-weight="700">THOTH RECORDS</text>
  <text x="390" y="578" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Update memory.yaml / Append journal entry</text>
  <text x="390" y="596" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Archive artifacts if significant</text>
  <text x="390" y="614" text-anchor="middle" fill="rgba(240,237,229,0.3)" font-family="JetBrains Mono, monospace" font-size="8">thoth.memory.updated</text>
