<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arr7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A951"/>
    </marker>
    <marker id="arr7e" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arr7dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(240,237,229,0.3)"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#020C08"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="52" fill="rgba(200,169,81,0.08)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <text x="600" y="33" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="18" font-weight="700" letter-spacing="0.08em">GOVERNANCE CYCLE</text>
  <text x="600" y="68" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="11" font-weight="300">Plan. Execute. Weigh. Heal. Record. Re-align.</text>

  <!-- Hexagonal/circular arrangement around Stele center -->
  <!-- Center: Stele -->
  <rect x="490" y="340" width="220" height="80" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(240,237,229,0.15)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="370" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Cinzel, serif" font-size="13" font-weight="700">STELE</text>
  <text x="600" y="390" text-anchor="middle" fill="rgba(240,237,229,0.35)" font-family="Inter, sans-serif" font-size="9">Every step inscribes an event</text>
  <text x="600" y="406" text-anchor="middle" fill="rgba(240,237,229,0.25)" font-family="JetBrains Mono, monospace" font-size="7">Append-only hash-chained ledger</text>

  <!-- ===== STEP 1: NET PUBLISHES ===== (top center) -->
  <rect x="400" y="82" width="400" height="90" rx="14" fill="rgba(200,169,81,0.06)" stroke="#C8A951" stroke-width="1.5"/>
  <circle cx="422" cy="104" r="12" fill="rgba(200,169,81,0.15)" stroke="#C8A951" stroke-width="1"/>
  <text x="422" y="109" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="12" font-weight="700">1</text>
  <text x="620" y="108" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="13" font-weight="700">NET PUBLISHES THE PLAN</text>
  <text x="600" y="130" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Scope definition / ADR alignment</text>
  <text x="600" y="148" text-anchor="middle" fill="rgba(240,237,229,0.4)" font-family="Inter, sans-serif" font-size="9" font-style="italic">The Loom of Intent weaves instructions</text>
  <text x="600" y="164" text-anchor="middle" fill="rgba(240,237,229,0.3)" font-family="JetBrains Mono, monospace" font-size="8">net.plan.published</text>
  <!-- Dashed to Stele -->
  <line x1="600" y1="172" x2="600" y2="340" stroke="rgba(240,237,229,0.12)" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ===== STEP 2: EXECUTE ===== (top right) -->
  <rect x="840" y="170" width="340" height="90" rx="14" fill="rgba(16,185,129,0.05)" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
  <circle cx="862" cy="192" r="12" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1"/>
  <text x="862" y="197" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="12" font-weight="700">2</text>
  <text x="1030" y="196" text-anchor="middle" fill="#10B981" font-family="Cinzel, serif" font-size="13" font-weight="700">MACHINE GODS EXECUTE</text>
  <text x="1010" y="218" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Anubis scans / Seba maps</text>
  <text x="1010" y="236" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Osiris checkpoints / Isis guards</text>
  <text x="1010" y="252" text-anchor="middle" fill="rgba(240,237,229,0.3)" font-family="JetBrains Mono, monospace" font-size="8">scan.complete / checkpoint.saved</text>
  <!-- Dashed to Stele -->
  <line x1="900" y1="260" x2="710" y2="360" stroke="rgba(240,237,229,0.12)" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ===== STEP 3: MA'AT WEIGHS ===== (bottom right) -->
  <rect x="840" y="380" width="340" height="100" rx="14" fill="rgba(200,169,81,0.06)" stroke="#C8A951" stroke-width="1.5"/>
  <circle cx="862" cy="402" r="12" fill="rgba(200,169,81,0.15)" stroke="#C8A951" stroke-width="1"/>
  <text x="862" y="407" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="12" font-weight="700">3</text>
  <text x="1030" y="406" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="13" font-weight="700">MA'AT WEIGHS</text>
  <text x="1010" y="428" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Coverage audit / Lint check</text>
  <text x="1010" y="446" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Canon compliance / Feather Weight</text>
  <text x="1010" y="464" text-anchor="middle" fill="#C8A951" font-family="Inter, sans-serif" font-size="9" font-weight="600">Pass threshold: 85/100</text>
  <text x="1010" y="476" text-anchor="middle" fill="rgba(240,237,229,0.3)" font-family="JetBrains Mono, monospace" font-size="8">maat.weigh.complete</text>
  <!-- Dashed to Stele -->
  <line x1="840" y1="410" x2="710" y2="380" stroke="rgba(240,237,229,0.12)" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ===== STEP 4: ISIS HEALS ===== (bottom center-right) -->
  <rect x="640" y="530" width="340" height="90" rx="14" fill="rgba(16,185,129,0.05)" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="662" cy="552" r="12" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1"/>
  <text x="662" y="557" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="12" font-weight="700">4</text>
  <text x="830" y="556" text-anchor="middle" fill="#10B981" font-family="Cinzel, serif" font-size="13" font-weight="700">ISIS HEALS THE DRIFT</text>
  <text x="810" y="578" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Auto-fix lint violations / Resolve vet warnings</text>
  <text x="810" y="596" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="10">Patch canon drift / Network remediation</text>
  <text x="810" y="614" text-anchor="middle" fill="rgba(240,237,229,0.3)" font-family="JetBrains Mono, monospace" font-size="8">isis.heal.complete</text>
