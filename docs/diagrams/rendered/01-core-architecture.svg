  <text x="600" y="33" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="18" font-weight="700" letter-spacing="0.08em">SIRSI PANTHEON -- CORE ARCHITECTURE</text>

  <!-- Subtitle -->
  <text x="600" y="68" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="Inter, sans-serif" font-size="11" font-weight="300">Infrastructure intelligence from one laptop to a 256-node fleet</text>

  <!-- ===== USER LAYER ===== -->
  <!-- User Box -->
  <rect x="510" y="80" width="180" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(200,169,81,0.4)" stroke-width="1"/>
  <text x="600" y="105" text-anchor="middle" fill="#F0EDE5" font-family="Inter, sans-serif" font-size="13" font-weight="500">User / Developer</text>

  <!-- CLI Box -->
  <rect x="350" y="140" width="170" height="48" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <text x="435" y="160" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="11" font-weight="600">SIRSI CLI</text>
  <text x="435" y="178" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="JetBrains Mono, monospace" font-size="9">Cobra framework</text>

  <!-- MCP Box -->
  <rect x="680" y="140" width="170" height="48" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(200,169,81,0.3)" stroke-width="1"/>
  <text x="765" y="160" text-anchor="middle" fill="#C8A951" font-family="Cinzel, serif" font-size="11" font-weight="600">MCP SERVER</text>
  <text x="765" y="178" text-anchor="middle" fill="rgba(240,237,229,0.6)" font-family="JetBrains Mono, monospace" font-size="9">JSON-RPC 2.0 stdio</text>

