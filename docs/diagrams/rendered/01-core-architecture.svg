  <line x1="640" y1="120" x2="730" y2="140" stroke="#C8A951" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="680" y="127" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">tool calls</text>

