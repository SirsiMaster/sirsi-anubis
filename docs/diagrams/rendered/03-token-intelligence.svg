  <text x="140" y="318" text-anchor="middle" fill="#EF4444" font-family="Inter, sans-serif" font-size="9" font-weight="600">PROBLEM</text>
  <text x="140" y="334" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">~371K tokens per session</text>
  <text x="140" y="344" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="8">$0.30/session wasted</text>

