  <text x="140" y="155" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="10">ANSI escape codes</text>
  <text x="140" y="175" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="10">Repeated lines</text>
  <text x="140" y="195" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="10">Blank runs</text>
  <text x="140" y="215" text-anchor="middle" fill="rgba(240,237,229,0.7)" font-family="Inter, sans-serif" font-size="10">Full file dumps</text>
  <text x="140" y="245" text-anchor="middle" fill="#EF4444" font-family="Inter, sans-serif" font-size="14" font-weight="700">100%</text>
  <text x="140" y="262" text-anchor="middle" fill="rgba(240,237,229,0.5)" font-family="Inter, sans-serif" font-size="9">of tokens consumed</text>

