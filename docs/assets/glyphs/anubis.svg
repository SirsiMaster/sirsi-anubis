<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="#C8A951">
  <!-- Anubis jackal head, Egyptian profile facing right -->
  <!-- Left ear (tall, pointed) -->
  <path d="M 52 100 L 38 20 Q 36 10 42 8 L 48 10 Q 56 30 62 60 L 64 80 Z"/>
  <!-- Right ear (tall, pointed) -->
  <path d="M 80 70 L 88 12 Q 90 4 96 6 L 100 12 Q 98 40 94 60 L 88 76 Z"/>
  <!-- Skull/forehead -->
  <path d="M 48 90 Q 50 70 62 65 Q 72 60 85 65 Q 95 72 98 85 L 98 100 Q 95 95 88 92 Q 75 86 62 90 Z"/>
  <!-- Snout - long elegant muzzle -->
  <path d="M 98 85 Q 105 82 115 80 Q 130 78 148 80 Q 160 82 168 88 Q 172 92 170 96 Q 168 100 160 102 L 148 104 Q 135 106 120 106 Q 108 106 100 108 L 98 100 Z"/>
  <!-- Lower jaw -->
  <path d="M 100 108 Q 110 112 125 114 Q 140 115 155 112 Q 162 108 168 100 Q 170 96 168 94 L 170 96 Q 172 100 168 106 Q 160 116 145 120 Q 130 122 115 120 Q 105 118 98 115 L 90 118 Q 82 120 76 120 L 72 118 Q 74 114 80 110 Q 88 106 100 108 Z"/>
  <!-- Neck -->
  <path d="M 48 100 Q 46 110 44 125 Q 42 140 42 160 Q 42 175 44 190 L 48 200 Q 55 210 65 218 Q 75 224 88 228 L 100 230 L 110 228 Q 118 224 124 218 Q 130 210 132 200 L 134 190 Q 134 175 132 160 Q 128 140 120 125 Q 112 115 100 110 Q 88 108 80 110 Q 72 114 68 120 Q 60 115 55 108 Q 50 102 48 100 Z"/>
  <!-- Eye -->
  <ellipse cx="88" cy="88" rx="5" ry="4.5" fill="#022c22"/>
  <!-- Eye liner (Egyptian style) -->
  <path d="M 94 88 Q 100 86 108 85" fill="none" stroke="#022c22" stroke-width="2" stroke-linecap="round"/>
  <!-- Nostril -->
  <ellipse cx="164" cy="92" rx="2.5" ry="2" fill="#022c22"/>
  <!-- Collar/necklace line -->
  <path d="M 44 190 Q 60 185 88 184 Q 115 185 132 190" fill="none" stroke="#022c22" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 46 196 Q 62 191 88 190 Q 114 191 130 196" fill="none" stroke="#022c22" stroke-width="2" stroke-linecap="round"/>
</svg>
