checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: SirsiMaster
    name: sirsi-pantheon
  name_template: "v{{.Version}}"
  prerelease: auto
  draft: false
  header: |
    ## 🏛️ Sirsi Pantheon {{.Version}}

    Unified DevOps Intelligence Platform — One Install, All Deities.

    ### Deities
    - 𓂀 **Anubis** — Infrastructure Hygiene (foundational)
    - 🪶 **Ma'at** — QA/QC Governance
    - 𓁟 **Thoth** — Persistent Knowledge

    ### Highlights
    - 18 CLI commands, 58 scan rules, 20 internal modules
    - Mirror file deduplication — 27x faster than naive hashing
    - Trash-first cleaning with per-file decision log
    - Neural brain downloader + classifier interface
    - MCP server for AI IDE integration (Claude, Cursor, Windsurf)
    - Scales policy engine for fleet enforcement
    - Ma'at QA/QC governance assessments
    - 29 hardcoded safety protections, 522 tests, 18 test suites

    ### Install
    ```bash
    brew tap SirsiMaster/tools && brew install sirsi-pantheon
    # or
    go install github.com/SirsiMaster/sirsi-pantheon/cmd/pantheon@{{.Tag}}
    ```
  footer: |
    ---
    *🏛️ One install. All deities. Nothing escapes the Weighing.*
