# goreleaser config — Sirsi Pantheon v0.4.0-alpha
# Docs: https://goreleaser.com
version: 2

project_name: sirsi-pantheon

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: pantheon
    main: ./cmd/pantheon/
    binary: pantheon
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: pantheon-agent
    main: ./cmd/pantheon-agent/
    binary: pantheon-agent
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    builds:
      - pantheon
      - pantheon-agent
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/default_rules.yaml
      - configs/example_policy.yaml
      - configs/workspace_template.yaml

